<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Libro de Caja</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F3EEDF;
    --paper-dark:#E9E1CB;
    --ink:#231F18;
    --ink-soft:#5B5548;
    --ledger:#153328;
    --ledger-light:#1E4638;
    --gold:#B08A3E;
    --gold-light:#D8BC7E;
    --red:#8F3527;
    --red-bg:#F1DDD6;
    --green:#2B5E45;
    --green-bg:#DCE7DA;
    --line:#C9BF9F;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse at top left, rgba(21,51,40,0.06), transparent 60%),
      var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding:32px 16px 64px;
  }
  .wrap{max-width:880px;margin:0 auto;}

  /* Header */
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom:3px solid var(--ledger);
    padding-bottom:14px;
    margin-bottom:28px;
    flex-wrap:wrap;
    gap:12px;
  }
  .brand-eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:4px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:34px;
    margin:0;
    color:var(--ledger);
    letter-spacing:-.01em;
  }
  .today{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--ink-soft);
    text-align:right;
  }

  /* Settings panel */
  .settings{
    background:var(--paper-dark);
    border:1px solid var(--line);
    border-radius:3px;
    padding:14px 18px;
    margin-bottom:24px;
  }
  .settings label{display:block;margin-bottom:8px;}
  .settings-row{display:flex;gap:10px;}
  .settings-row input{flex:1;font-family:'IBM Plex Mono',monospace;font-size:12.5px;}
  .settings-status{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    margin-top:8px;
    color:var(--ink-soft);
  }
  .settings-status.ok{color:var(--green);}
  .settings-status.warn{color:var(--red);}

  /* Balance tape - signature element */
  .tape{
    background:var(--ledger);
    color:var(--paper);
    border-radius:2px;
    position:relative;
    padding:22px 26px;
    margin-bottom:32px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
    box-shadow:0 10px 24px -14px rgba(21,51,40,0.55);
  }
  .tape::before,.tape::after{
    content:"";
    position:absolute;
    left:0;right:0;height:10px;
    background-image:radial-gradient(circle, var(--paper) 3.5px, transparent 3.6px);
    background-size:16px 16px;
    background-repeat:repeat-x;
  }
  .tape::before{top:-5px;}
  .tape::after{bottom:-5px;}
  .tape-item .lbl{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:.12em;
    text-transform:uppercase;
    opacity:.7;
    margin-bottom:6px;
  }
  .tape-item .val{
    font-family:'IBM Plex Mono',monospace;
    font-size:24px;
    font-weight:600;
    font-variant-numeric:tabular-nums;
  }
  .tape-item.neg .val{color:#E3A190;}
  .tape-item.pos .val{color:#9FD4B5;}

  /* Form card */
  .card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:3px;
    padding:24px;
    margin-bottom:32px;
    position:relative;
  }
  .card::before{
    content:"NUEVO MOVIMIENTO";
    position:absolute;
    top:-11px;
    left:20px;
    background:var(--gold);
    color:var(--paper);
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:.14em;
    padding:3px 10px;
    border-radius:2px;
  }
  form{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:16px;
    margin-top:10px;
  }
  .field{display:flex;flex-direction:column;gap:6px;}
  .field.span2{grid-column:span 2;}
  .field.span3{grid-column:span 3;}
  label{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
  }
  input,select{
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    padding:10px 11px;
    border:1px solid var(--line);
    border-radius:2px;
    background:#fff;
    color:var(--ink);
  }
  input:focus,select:focus{
    outline:2px solid var(--gold);
    outline-offset:1px;
    border-color:var(--gold);
  }
  .type-toggle{
    display:flex;
    gap:8px;
  }
  .type-toggle button{
    flex:1;
    padding:10px;
    border:1px solid var(--line);
    background:#fff;
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    letter-spacing:.06em;
    border-radius:2px;
    cursor:pointer;
    color:var(--ink-soft);
    transition:.15s;
  }
  .type-toggle button.active[data-t="Gasto"]{
    background:var(--red);border-color:var(--red);color:#fff;
  }
  .type-toggle button.active[data-t="Ingreso"]{
    background:var(--green);border-color:var(--green);color:#fff;
  }
  .submit-row{
    grid-column:span 3;
    display:flex;
    justify-content:flex-end;
    margin-top:4px;
  }
  button.primary{
    font-family:'IBM Plex Mono',monospace;
    background:var(--ledger);
    color:var(--paper);
    border:none;
    padding:12px 26px;
    font-size:13px;
    letter-spacing:.08em;
    text-transform:uppercase;
    border-radius:2px;
    cursor:pointer;
  }
  button.primary:hover{background:var(--ledger-light);}

  /* Ledger list */
  .ledger-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
  }
  .ledger-head h2{
    font-family:'Fraunces',serif;
    font-size:20px;
    font-weight:600;
    color:var(--ledger);
    margin:0;
  }
  .actions{display:flex;gap:10px;}
  .ghost-btn{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    letter-spacing:.06em;
    background:transparent;
    border:1px solid var(--ledger);
    color:var(--ledger);
    padding:8px 14px;
    border-radius:2px;
    cursor:pointer;
  }
  .ghost-btn:hover{background:var(--ledger);color:var(--paper);}

  .foot-note{
    margin-top:18px;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    text-align:center;
  }
  @media (max-width:640px){
    form{grid-template-columns:1fr 1fr;}
    .field.span2,.field.span3,.submit-row{grid-column:span 2;}
    .tape{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="brand-eyebrow">Registro personal &middot; N.º de libro 01</div>
      <h1>Libro de Caja</h1>
    </div>
    <div class="today" id="todayLabel"></div>
  </header>

  <div class="settings" id="settingsBox">
    <label for="scriptUrl">URL de tu Apps Script (Aplicación web)</label>
    <div class="settings-row">
      <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
      <button class="ghost-btn" id="saveUrlBtn">Guardar</button>
    </div>
    <div class="settings-status" id="urlStatus"></div>
  </div>

  <div class="tape">
    <div class="tape-item pos">
      <div class="lbl">Ingresos</div>
      <div class="val" id="totalIngresos">$0</div>
    </div>
    <div class="tape-item neg">
      <div class="lbl">Gastos</div>
      <div class="val" id="totalGastos">$0</div>
    </div>
    <div class="tape-item">
      <div class="lbl">Saldo</div>
      <div class="val" id="totalSaldo">$0</div>
    </div>
  </div>

  <div class="card">
    <form id="movForm">
      <div class="field span3">
        <label>Tipo</label>
        <div class="type-toggle">
          <button type="button" data-t="Gasto" class="active">Gasto</button>
          <button type="button" data-t="Ingreso">Ingreso</button>
        </div>
      </div>

      <div class="field">
        <label for="fecha">Fecha</label>
        <input type="date" id="fecha" required>
      </div>

      <div class="field">
        <label for="monto">Monto</label>
        <input type="number" id="monto" placeholder="0" min="0" step="1" required>
      </div>

      <div class="field">
        <label for="categoria">Categoría</label>
        <select id="categoria">
          <option>Vivienda</option>
          <option>Alimentación</option>
          <option>Transporte</option>
          <option>Servicios</option>
          <option>Salud</option>
          <option>Educación</option>
          <option>Entretenimiento</option>
          <option>Ropa</option>
          <option>Ahorro</option>
          <option>Sueldo</option>
          <option>Otros</option>
        </select>
      </div>

      <div class="field span2">
        <label for="descripcion">Descripción</label>
        <input type="text" id="descripcion" placeholder="Ej: supermercado, arriendo, sueldo...">
      </div>

      <div class="field">
        <label for="metodo">Método de pago</label>
        <select id="metodo">
          <option>Efectivo</option>
          <option>Débito</option>
          <option>Crédito</option>
          <option>Transferencia</option>
        </select>
      </div>

      <div class="submit-row">
        <button type="submit" class="primary">Agregar movimiento</button>
      </div>
    </form>
  </div>

  <div class="ledger-head">
    <h2 id="confirmMsg">Cargá tu próximo movimiento</h2>
    <div class="actions">
      <button class="ghost-btn" id="clearBtn">Borrar caché local</button>
    </div>
  </div>
  <div class="foot-note">Cada movimiento se envía directo a tu Google Sheet mediante Apps Script. Los totales de arriba son un resumen local de esta sesión, no reemplazan la planilla.</div>

</div>

<script>
let entries = [];
let currentType = "Gasto";
let scriptUrl = "https://script.google.com/macros/s/AKfycbwYR4S9ExPSyHqar4LTaEh7mJnnyH22OiFf3Qa4P-R7q5Q3v8Edi21BW5MLCURko63V/exec";

const $ = (id) => document.getElementById(id);

function todayISO(){
  const d = new Date();
  return d.toISOString().slice(0,10);
}

$("fecha").value = todayISO();
$("todayLabel").textContent = new Date().toLocaleDateString('es-CL', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

async function loadScriptUrl(){
  try{
    const saved = localStorage.getItem('appsScriptUrl');
    if(saved) scriptUrl = saved;
  }catch(err){
    // usa el valor por defecto
  }
  $("scriptUrl").value = scriptUrl;
  updateUrlStatus();
}

function updateUrlStatus(){
  const el = $("urlStatus");
  if(scriptUrl){
    el.textContent = "Conectado a tu Google Sheet.";
    el.className = "settings-status ok";
  }else{
    el.textContent = "Pegá la URL de tu Apps Script (termina en /exec) para poder guardar movimientos.";
    el.className = "settings-status warn";
  }
}

$("saveUrlBtn").addEventListener('click', async ()=>{
  scriptUrl = $("scriptUrl").value.trim();
  try{
    localStorage.setItem('appsScriptUrl', scriptUrl);
  }catch(err){
    console.error('No se pudo guardar la URL', err);
  }
  updateUrlStatus();
});

document.querySelectorAll('.type-toggle button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.type-toggle button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentType = btn.dataset.t;
  });
});

function fmt(n){
  const sign = n < 0 ? "-" : "";
  return sign + "$" + Math.abs(Math.round(n)).toLocaleString('es-CL');
}

function computeTotals(){
  let ingresos = 0, gastos = 0;
  entries.forEach(e=>{
    if(e.tipo === "Ingreso") ingresos += e.monto;
    else gastos += e.monto;
  });
  $("totalIngresos").textContent = fmt(ingresos);
  $("totalGastos").textContent = fmt(gastos);
  $("totalSaldo").textContent = fmt(ingresos - gastos);
}

function render(){
  computeTotals();
}

function showConfirmation(entry){
  const el = $("confirmMsg");
  const signo = entry.tipo === 'Gasto' ? '-' : '+';
  el.textContent = `Agregado: ${entry.categoria} ${signo}${fmt(Math.abs(entry.monto))} (${entry.fecha})`;
}

async function load(){
  try{
    const raw = localStorage.getItem('movimientos');
    entries = raw ? JSON.parse(raw) : [];
  }catch(err){
    entries = [];
  }
  render();
}

async function save(){
  try{
    localStorage.setItem('movimientos', JSON.stringify(entries));
  }catch(err){
    console.error('No se pudo guardar', err);
  }
}

$("movForm").addEventListener('submit', async (e)=>{
  e.preventDefault();
  const monto = parseFloat($("monto").value);
  if(!monto || monto <= 0) return;

  if(!scriptUrl){
    $("urlStatus").textContent = "Configurá primero la URL de tu Apps Script arriba.";
    $("urlStatus").className = "settings-status warn";
    $("scriptUrl").focus();
    return;
  }

  const entry = {
    id: Date.now(),
    fecha: $("fecha").value || todayISO(),
    tipo: currentType,
    categoria: $("categoria").value,
    descripcion: $("descripcion").value.trim(),
    monto: monto,
    metodo: $("metodo").value
  };

  entries.push(entry);
  await save();
  render();
  $("confirmMsg").textContent = "Enviando a Google Sheets...";

  try{
    await fetch(scriptUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(entry)
    });
    showConfirmation(entry);
  }catch(err){
    $("confirmMsg").textContent = "No se pudo enviar. Revisá la URL o tu conexión.";
  }

  $("monto").value = "";
  $("descripcion").value = "";
  $("monto").focus();
});

$("clearBtn").addEventListener('click', async ()=>{
  if(!confirm('¿Borrar el resumen local de esta sesión? (no afecta tu Google Sheet)')) return;
  entries = [];
  await save();
  render();
  $("confirmMsg").textContent = "Cargá tu próximo movimiento";
});

load();
loadScriptUrl();
</script>
</body>
</html>
